<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 32">
  <defs>
    <style>
      .font { font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 20px; letter-spacing: -0.02em; }
    </style>
    
    <symbol id="logo-dark" viewBox="0 0 160 32">
      <!-- Icon Container -->
      <rect x="0" y="2" width="28" height="28" rx="4" fill="#0a0a0a" stroke="#2a2a2a" stroke-width="1"/>
      <path d="M7 10 H21 L7 22 H21" fill="none" stroke="#00dc82" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="miter" />
      <!-- Wordmark -->
      <text x="36" y="23" class="font" fill="#00dc82">Zero<tspan fill="#f0f0f0">Tools</tspan></text>
    </symbol>
    
    <symbol id="logo-light" viewBox="0 0 160 32">
      <!-- Icon Container -->
      <rect x="0" y="2" width="28" height="28" rx="4" fill="#fafafa" stroke="#d8d8d8" stroke-width="1"/>
      <path d="M7 10 H21 L7 22 H21" fill="none" stroke="#009955" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="miter" />
      <!-- Wordmark -->
      <text x="36" y="23" class="font" fill="#009955">Zero<tspan fill="#111111">Tools</tspan></text>
    </symbol>
  </defs>

  <!-- Default fallback view (Dark Mode) -->
  <use href="#logo-dark" />
</svg>
